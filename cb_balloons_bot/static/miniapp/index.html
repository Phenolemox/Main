<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>CB Balloons</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <script src="/static/miniapp/platform.js"></script>
  <link rel="stylesheet" href="/static/miniapp/styles.css"/>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Color Balloons</p>
      <h1>CB Balloons</h1>
      <p class="lead">Собери идеальную комбинацию сфер за 5 раундов</p>
    </header>

    <section id="screen-start" class="screen active">
      <div class="card">
        <p>Мини-игра для Telegram и MAX. Полная версия с очками и достижениями — в боте через <b>/ball</b>.</p>
        <button id="btn-start" class="btn primary">Играть</button>
      </div>
    </section>

    <section id="screen-choose" class="screen">
      <h2>Выбери сферу</h2>
      <p class="muted" id="round-label">Раунд 1</p>
      <div class="balls" id="balls"></div>
      <p class="hint">Нажми на сферу — результат сохранится локально</p>
    </section>

    <section id="screen-result" class="screen">
      <div class="card result">
        <div class="score" id="score-value">0</div>
        <h2 id="result-text">Отличный выбор!</h2>
        <p class="muted" id="result-detail"></p>
        <button id="btn-again" class="btn ghost">Сыграть ещё</button>
        <button id="btn-bot" class="btn primary">Открыть бота</button>
      </div>
    </section>

    <footer class="footer">
      <span id="platform-badge">Telegram Mini App</span>
    </footer>
  </div>
  <script src="/static/miniapp/app.js"></script>
</body>
</html>
