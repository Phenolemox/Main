<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>O’HARA — предложения по акциям</title><style>:root{--red:#f60c15;--black:#0d0e11;--muted:#767b86;--line:#e7e8ed;--bg:#f4f5f7}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:linear-gradient(180deg,#0d0e11 0,#18191d 245px,var(--bg) 245px);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:#17181c;padding:calc(env(safe-area-inset-top) + 12px) 12px 28px}.wrap{max-width:560px;margin:auto}.top{color:#fff;padding:12px 4px 18px}.brand{display:flex;justify-content:space-between;align-items:center}.logo{font-size:28px;font-weight:950;letter-spacing:.05em}.logo i{font-style:normal;color:var(--red)}.pill{font-size:12px;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.08)}.sub{margin-top:8px;color:rgba(255,255,255,.72);font-size:13px;line-height:1.35}.hero{background:linear-gradient(145deg,#fff,#fff4f5);border-radius:32px;padding:20px 18px;box-shadow:0 18px 55px rgba(13,14,17,.15);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;right:-80px;top:-80px;width:210px;height:210px;background:radial-gradient(circle,var(--red),transparent 65%);opacity:.16}.k{font-size:12px;color:var(--red);font-weight:950;letter-spacing:.16em;text-transform:uppercase}.h1{font-size:34px;line-height:.98;font-weight:950;letter-spacing:-.05em;margin:9px 0 6px}.muted{color:var(--muted);font-size:13px;line-height:1.4}.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;margin-top:14px;box-shadow:0 12px 35px rgba(13,14,17,.08)}.section-title{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-bottom:10px}.section-title h2{font-size:20px;margin:0}.section-title small{color:var(--muted);font-weight:800}.tabs{display:flex;gap:8px;overflow:auto;padding:0 0 12px;scrollbar-width:none}.tabs button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 12px;white-space:nowrap;font-weight:850}.tabs button.on{background:#111;color:#fff;border-color:#111}.item{border:1px solid var(--line);border-radius:20px;padding:13px;background:#fff;margin-top:9px}.item.hot{border-color:#ffc1c5;background:linear-gradient(145deg,#fff,#fff5f5)}.item b{display:block;font-size:15px}.item p{margin:5px 0 0;color:var(--muted);font-size:12.5px;line-height:1.42}.chiprow{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.chip{font-size:11px;padding:6px 8px;border-radius:999px;background:#f0f1f4}.chip.red{background:#111;color:#fff}.chip.yellow{background:#fef3c7}.controls{display:grid;grid-template-columns:1fr 1fr;gap:9px}.select{width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;padding:13px 12px;font-weight:850;appearance:none}.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}.dow{text-align:center;color:#858995;font-size:11px;font-weight:900}.day{min-height:70px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:7px 6px;overflow:hidden}.day.dim{opacity:.28}.day.today{border:2px solid var(--red)}.dnum{font-weight:950}.tag{display:block;margin-top:4px;border-radius:7px;padding:3px 4px;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.season{background:#dbeafe}.holiday{background:#fef3c7}.local{background:#fff1d6;color:#8a5200}.foot{text-align:center;color:#969aa4;font-size:11px;margin:18px 0}@media(min-width:720px){.wrap{max-width:980px}.main{display:grid;grid-template-columns:420px 1fr;gap:16px}.hero{position:sticky;top:16px}}</style></head><body><div class="wrap"><div class="top"><div class="brand"><div class="logo">O’HARA<i>.</i></div><div class="pill" id="dateNow"></div></div><div class="sub">Визуальная панель предложений по стимулирующим акциям. Акции пока не распределены по датам.</div></div><div class="main"><div><div class="hero"><div class="k">текущий период</div><div class="h1" id="seasonNow">—</div><div class="muted" id="seasonInfo">—</div><div class="chiprow" id="nowChips"></div></div><div class="card"><div class="section-title"><h2>Предложения</h2><small id="counter"></small></div><div class="tabs" id="tabs"></div><div id="details"></div></div></div><div><div class="card"><div class="section-title"><h2 id="calTitle">Календарь</h2><small>сезоны и праздники</small></div><div class="controls"><select class="select" id="year"><option>2026</option><option>2027</option></select><select class="select" id="month"></select></div><div class="cal" id="dow"></div><div class="cal" id="cal"></div></div><div class="card"><h2>Лента событий месяца</h2><div id="feed"></div></div></div></div><div class="foot">Размеры скидок и точные периоды заполняются после согласования.</div></div><script>const months=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];function D(s){let a=s.split('-').map(Number);return new Date(a[0],a[1]-1,a[2],12)}function iso(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate(),12)}function fmt(d){return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'})}function long(d){return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'})}function inside(d,x){let t=iso(d);return t>=x.s&&t<=x.e}function weekend(d){return [0,6].includes(d.getDay())}function today(){let n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate(),12)}const seasons=[['Новогодний сезон 2026','2026-01-01','2026-01-11'],['Смена коллекции 2026','2026-01-12','2026-02-28'],['Весенний сезон 2026','2026-03-01','2026-05-09'],['Летний сезон 2026','2026-05-10','2026-06-30'],['Распродажа 2026','2026-07-01','2026-08-31'],['Старт сезона 2026','2026-09-01','2026-09-30'],['Активный сезон 2026','2026-10-01','2026-12-31'],['Новогодний сезон 2027','2027-01-01','2027-01-11'],['Смена коллекции 2027','2027-01-12','2027-02-28'],['Весенний сезон 2027','2027-03-01','2027-05-09'],['Летний сезон 2027','2027-05-10','2027-06-30'],['Распродажа 2027','2027-07-01','2027-08-31'],['Старт сезона 2027','2027-09-01','2027-09-30'],['Активный сезон 2027','2027-10-01','2027-12-31']].map(x=>({n:x[0],s:D(x[1]),e:D(x[2])}));const events=[['Новогодние каникулы','2026-01-01','2026-01-11','holiday'],['8 марта','2026-03-08','2026-03-09','holiday'],['Майские праздники','2026-05-01','2026-05-09','holiday'],['День города Санкт-Петербург','2026-05-27','2026-05-27','local'],['День города Новосибирск','2026-06-28','2026-06-28','local'],['День города Москва','2026-09-05','2026-09-05','local'],['Новогодние каникулы','2027-01-01','2027-01-11','holiday'],['8 марта','2027-03-08','2027-03-08','holiday'],['Майские праздники','2027-05-01','2027-05-09','holiday'],['День города Санкт-Петербург','2027-05-27','2027-05-27','local'],['День города Новосибирск','2027-06-27','2027-06-27','local'],['День города Москва','2027-09-04','2027-09-04','local']].map(x=>({n:x[0],s:D(x[1]),e:D(x[2]),c:x[3]}));const actions=[{b:'Из прошлого предложения',n:'Стильный комплект',m:'Скидка/спецусловие при покупке верхней одежды вместе с аксессуаром или комплектом аксессуаров.',v:'___% / ___ рублей / подарок'},{b:'Из прошлого предложения',n:'Приведи подругу',m:'Клиент получает сертификат/промокод, если приглашённый покупатель совершает покупку.',v:'___ рублей / покупка от ___ рублей'},{b:'Из прошлого предложения',n:'Подарок при покупке',m:'При покупке от заданной суммы клиент получает подарок.',v:'Покупка от ___ рублей / подарок'},{b:'Проверенная механика',n:'20% на второе изделие',m:'Скидка на второе изделие, которую удобно предлагать после выбора первой вещи.',v:'20% на второе изделие'},{b:'Новые предложения',n:'Погода решает',m:'Покупатель получает специальную скидку, если в городе наступает погодное условие: первый 0 °C, первый +20 °C или первый −20 °C.',v:'___% / ___ рублей'},{b:'Новые предложения',n:'Скидка за примерку',m:'Покупатель получает скидку, если примеряет 3 изделия, которые предложил консультант: куртки/пуховики/жилеты или аксессуары к образу.',v:'___%'},{b:'Новые предложения',n:'Карточка с выбором скидки',m:'Покупатель получает карточку/купон и открывает персональную выгоду.',v:'___% / ___ рублей / подарок'},{b:'Новые предложения',n:'Скидка на День города',m:'В День города в конкретном городе действует локальная акция O’HARA.',v:'___% / ___ рублей / подарок'},{b:'Новые предложения',n:'Скидка на тип товара',m:'На определённый период выбираем товарный фокус: жилеты, куртки, пуховики, экошубы или пальто.',v:'___% / ___ рублей'},{b:'Новые предложения',n:'Скидка ТЦ',m:'Локальная акция для конкретного ТЦ: День рождения, мероприятие или предложение для сотрудников торгового центра.',v:'___% / ___ рублей / подарок'}];let st={y:2026,m:4,i:0};months.forEach((x,i)=>month.insertAdjacentHTML('beforeend',`<option value="${i}">${x}</option>`));year.onchange=()=>{st.y=+year.value;render()};month.onchange=()=>{st.m=+month.value;render()};function currentSeason(d){return seasons.find(x=>inside(d,x))||seasons[0]}function active(list,d){return list.filter(x=>inside(d,x))}function item(a,b,c,h=''){return `<div class="item ${h}"><b>${a}</b><p>${b}</p><p>${c}</p></div>`}function renderHero(){let t=today(),s=currentSeason(t);dateNow.textContent=fmt(t);seasonNow.textContent=s.n;seasonInfo.textContent=`Период: ${fmt(s.s)} — ${fmt(s.e)}`;let ch=[`<span class="chip season">Сезон: ${s.n}</span>`];active(events,t).forEach(e=>ch.push(`<span class="chip ${e.c}">${e.n}</span>`));if(weekend(t))ch.push('<span class="chip">Выходной</span>');nowChips.innerHTML=ch.join('')}function renderActions(){counter.textContent=actions.length+' позиций';tabs.innerHTML=actions.map((a,i)=>`<button class="${st.i===i?'on':''}" onclick="st.i=${i};renderActions()">${i+1}. ${a.n}</button>`).join('');let a=actions[st.i];details.innerHTML=item(a.n,a.m,`Блок: ${a.b}<br>Размер выгоды: ${a.v}`,'hot')}function renderCal(){calTitle.textContent=`Календарь: ${months[st.m]} ${st.y}`;year.value=st.y;month.value=st.m;dow.innerHTML=['пн','вт','ср','чт','пт','сб','вс'].map(x=>`<div class="dow">${x}</div>`).join('');let f=new Date(st.y,st.m,1,12),start=new Date(f);start.setDate(1-((f.getDay()+6)%7));let out=[];for(let i=0;i<42;i++){let d=new Date(start);d.setDate(start.getDate()+i);let dim=d.getMonth()!=st.m,ss=currentSeason(d),ev=active(events,d),tags=[];if(ss)tags.push(`<span class="tag season">${ss.n}</span>`);ev.forEach(e=>tags.push(`<span class="tag ${e.c}">${e.n}</span>`));out.push(`<div class="day ${dim?'dim':''} ${fmt(d)==fmt(today())?'today':''}"><div class="dnum">${d.getDate()}</div>${tags.slice(0,3).join('')}</div>`)}cal.innerHTML=out.join('')}function renderFeed(){let rows=[];for(let d=new Date(st.y,st.m,1,12);d.getMonth()==st.m;d.setDate(d.getDate()+1)){let ev=active(events,d);if(ev.length||weekend(d)){rows.push(item(long(d),ev.map(x=>x.n).join(' · ')||'Выходной день',`Сезон: ${currentSeason(d).n}`))}}feed.innerHTML=rows.join('')||item('Событий нет','На месяц не заведены праздники или локальные события.','')}function render(){renderHero();renderActions();renderCal();renderFeed()}render();</script></body></html>
