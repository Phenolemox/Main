<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Чек-лист магазина</title><style>:root{--red:#f60c15;--dark:#161616;--bg:#f5f5f5;--green:#16a34a;--orange:#f97316;--blue:#2563eb}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--dark)}.app{max-width:560px;margin:auto;padding:16px}.hero{background:linear-gradient(135deg,#111,#f60c15);color:#fff;padding:24px;border-radius:28px}.hero h1{margin:0 0 10px;font-size:34px}.progress{height:12px;background:#ddd;border-radius:999px;overflow:hidden;margin:18px 0}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--red),#ff9d00);transition:.3s}.block{background:#fff;border-radius:24px;padding:16px;margin-bottom:14px;opacity:.45;transition:.3s}.block.active,.block.done{opacity:1}.head{display:flex;gap:12px;align-items:center;margin-bottom:10px}.icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px}.personnel{background:var(--orange)}.product{background:var(--green)}.process{background:var(--blue)}.sales{background:var(--red)}.question{display:flex;gap:12px;padding:12px 0;border-top:1px solid #eee;align-items:flex-start}.question:first-child{border-top:0}.check{width:34px;height:34px;border-radius:12px;border:2px solid #ccc;flex:0 0 34px;display:flex;align-items:center;justify-content:center;font-weight:900}.question.done .check{background:var(--green);border-color:var(--green);color:#fff}.question.done .check:before{content:'✓'}.locked{display:none;color:#777;padding:10px 0}.block:not(.active):not(.done) .questions{display:none}.block:not(.active):not(.done) .locked{display:block}.result{display:none;background:#fff;padding:18px;border-radius:28px;margin-top:20px}.result.show{display:block}.donut{width:220px;height:220px;border-radius:50%;margin:18px auto;position:relative}.donut:after{content:attr(data-label);position:absolute;inset:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900}.legend div{display:flex;justify-content:space-between;background:#f7f7f7;padding:12px;border-radius:14px;margin-top:8px}button.reset{width:100%;padding:15px;border:0;border-radius:16px;background:#111;color:#fff;font-weight:800;margin-top:14px}</style></head><body><main class='app'><section class='hero'><h1>Проверка магазина</h1><p>4 блока · 12 вопросов · мобильная версия</p></section><div class='progress'><div class='bar' id='bar'></div></div><div id='blocks'></div><section class='result' id='result'><h2>Статистика проверки</h2><div class='donut' id='donut' data-label='100%'></div><div class='legend' id='legend'></div><button class='reset' onclick='resetAll()'>Начать заново</button></section></main><script>const data=[{id:'personnel',title:'Персонал',cls:'personnel',icon:'👥',q:['Сотрудники готовы к работе','Есть понимание KPI','Продавцы активно работают с покупателями']},{id:'product',title:'Товар',cls:'product',icon:'🧥',q:['Товар отпарен','Размеры представлены','Ценники корректны']},{id:'process',title:'Процессы',cls:'process',icon:'⚙️',q:['Касса работает','Поставка разобрана','Зал чистый и освещен']},{id:'sales',title:'Продажи',cls:'sales',icon:'📈',q:['Есть допродажи','Команда знает план','Контролируются примерки']}];const total=12;let state=JSON.parse(localStorage.getItem('checklist-v1')||'{}');data.forEach(b=>{if(!state[b.id])state[b.id]=[false,false,false]});function done(b){return state[b.id].every(Boolean)}function activeIndex(){const i=data.findIndex(b=>!done(b));return i===-1?3:i}function render(){const root=document.getElementById('blocks');root.innerHTML='';const ai=activeIndex();data.forEach((b,bi)=>{const el=document.createElement('div');el.className='block '+(done(b)?'done':'')+' '+((bi===ai&&!done(b))?'active':'');el.innerHTML=`<div class='head'><div class='icon ${b.cls}'>${b.icon}</div><div><b>${b.title}</b><div>${state[b.id].filter(Boolean).length}/3</div></div></div><div class='locked'>Заверши предыдущий блок</div><div class='questions'>${b.q.map((q,i)=>`<div class='question ${state[b.id][i]?'done':''}' data-b='${b.id}' data-i='${i}'><div class='check'></div><div>${q}</div></div>`).join('')}</div>`;root.appendChild(el)});document.querySelectorAll('.question').forEach(q=>q.onclick=()=>{const b=q.dataset.b;const i=+q.dataset.i;state[b][i]=!state[b][i];save();render()});const completed=data.reduce((s,b)=>s+state[b.id].filter(Boolean).length,0);document.getElementById('bar').style.width=(completed/total*100)+'%';if(completed===total)showResult();else document.getElementById('result').classList.remove('show')}function showResult(){const result=document.getElementById('result');result.classList.add('show');const colors=['#f97316','#16a34a','#2563eb','#f60c15'];let start=0;let grad=[];data.forEach((b,i)=>{let deg=90;grad.push(`${colors[i]} ${start}deg ${start+deg}deg`);start+=deg});const donut=document.getElementById('donut');donut.style.background=`conic-gradient(${grad.join(',')})`;const legend=document.getElementById('legend');legend.innerHTML=data.map((b,i)=>`<div><span>${b.title}</span><b>3/3</b></div>`).join('')}function save(){localStorage.setItem('checklist-v1',JSON.stringify(state))}function resetAll(){localStorage.removeItem('checklist-v1');state={};data.forEach(b=>state[b.id]=[false,false,false]);save();render();window.scrollTo({top:0,behavior:'smooth'})}render();</script></body></html>
