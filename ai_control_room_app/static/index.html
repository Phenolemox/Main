<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Control Room v0.3</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">AI</div>
        <div>
          <div class="brand-title">Control Room</div>
          <div class="brand-sub">v0.3 · ai-alliance.pro</div>
        </div>
      </div>

      <nav class="tree" id="tree">
        <!-- folders injected by app.js -->
      </nav>

      <div class="sidebar-foot">
        <span id="authDot" class="dot warn"></span>
        <span id="authLabel">проверка…</span>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="icon-btn" id="menuToggle" title="Меню">☰</button>
        <div class="crumbs" id="crumbs">Сервер</div>
        <div class="topbar-actions">
          <span id="authState" class="pill warn">checking</span>
          <input id="loginPassword" type="password" placeholder="Control password" autocomplete="current-password">
          <button id="login" class="btn">Войти</button>
          <button id="logout" class="btn ghost hidden">Выйти</button>
          <button id="refresh" class="btn ghost" title="Обновить">⟳</button>
        </div>
      </header>

      <main class="content" id="content">
        <div class="loading">Загрузка панели…</div>
      </main>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
