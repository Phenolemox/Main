<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poker Saloon</title>
  <style>
    body{margin:0;background:#140b09;color:#f7e5bf;font-family:system-ui,Arial,sans-serif;}
    .wrap{max-width:900px;margin:0 auto;padding:28px;}
    .card{border:1px solid #7a4d24;border-radius:24px;padding:24px;background:#25110d;box-shadow:0 20px 60px #0008;}
    h1{font-size:34px;margin:0 0 12px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:20px;}
    .tile{border:1px solid #8b6234;border-radius:18px;padding:16px;background:#0004;}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Poker Saloon</h1>
      <p>Личный кабинет игрока: очки, дуэли, достижения, мировой рейтинг.</p>
      <div class="grid">
        <div class="tile">Рейтинг</div>
        <div class="tile">Дуэли</div>
        <div class="tile">Ачивки</div>
        <div class="tile">Игры</div>
      </div>
    </section>
  </main>
</body>
</html>
